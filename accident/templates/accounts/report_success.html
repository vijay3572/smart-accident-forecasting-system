<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted</title>

    <style>
        body {
            background: #f4f8ff;
            font-family: Poppins, Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 40px;
            width: 450px;
            text-align: center;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }
        h2 {
            color: #28a745;
            font-size: 26px;
        }
        p {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>✔ Report Submitted Successfully!</h2>
    <p>Your accident report has been recorded.</p>

    <a href="{% url 'dashboard' %}">Go to Dashboard</a>
</div>

</body>
</html>
