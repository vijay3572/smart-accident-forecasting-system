{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Roadrisk{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
}

/* ===== NAVBAR STYLE ===== */
.navbar {
  background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.navbar-brand {
  font-weight: 700;
  color: white !important;
}

.nav-link {
  color: white !important;
  font-weight: 600;
  margin-right: 10px;
}

/* ===== DASHBOARD BUTTON IN NAVBAR ===== */
.dashboard-nav-btn {
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white !important;
  padding: 8px 14px;
  border-radius: 10px;
  font-weight: 600;
  transition: 0.3s;
}

.dashboard-nav-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 8px rgba(0, 114, 255, 0.7);
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🚗 Roadrisk</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/report/">Report</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/search/">Search</a>
        </li>

        <!-- ✅ DASHBOARD BUTTON (FIXED IN NAVBAR) -->
        <li class="nav-item">
          <a href="/dashboard/" class="nav-link dashboard-nav-btn">📊 Dashboard</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
{% block content %}
{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
